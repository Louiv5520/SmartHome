# AI Speaker – samlet Docker setup
# Kør: docker-compose up --build
# Frontend: http://<HOST_IP>:3000  (fx http://172.20.10.2:3000)
# Backend API: http://<HOST_IP>:5000/api

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-speaker-backend
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - PORT=5000
      - NODE_ENV=production
      - HOST_IP=${HOST_IP:-172.20.10.2}
    volumes:
      - ./backend/database:/app/database
    restart: unless-stopped
    networks:
      - ai-speaker-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - REACT_APP_GOOGLE_CLIENT_ID=${REACT_APP_GOOGLE_CLIENT_ID}
        - REACT_APP_API_URL=http://${HOST_IP:-172.20.10.2}:5000/api
        - REACT_APP_BACKEND_URL=http://${HOST_IP:-172.20.10.2}:5000/api
    container_name: ai-speaker-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ai-speaker-network

networks:
  ai-speaker-network:
    driver: bridge

