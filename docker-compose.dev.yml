# AI Speaker – udvikling med hot reload
# Kør: docker-compose -f docker-compose.dev.yml up --build
# Frontend: http://localhost:3000

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
    container_name: ai-speaker-backend-dev
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - PORT=5000
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/database:/app/database
    restart: unless-stopped
    networks:
      - ai-speaker-network
    command: sh -c "npm install && npm run dev"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ai-speaker-frontend-dev
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - REACT_APP_API_URL=http://${HOST_IP:-172.20.10.2}:5000/api
      - REACT_APP_BACKEND_URL=http://${HOST_IP:-172.20.10.2}:5000/api
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ai-speaker-network

networks:
  ai-speaker-network:
    driver: bridge
